name: Build Flutter APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Verify Flutter
        run: flutter --version

      # Create a guaranteed-valid Flutter project structure
      - name: Create fresh Flutter project
        run: |
          flutter create --org com.navassist --project-name nav_assist /tmp/fresh_project
          echo "Fresh project created"

      # Copy our source code into the fresh project
      - name: Copy source code
        run: |
          cp -r lib/ /tmp/fresh_project/lib/
          cp pubspec.yaml /tmp/fresh_project/pubspec.yaml
          if [ -d "assets" ]; then
            cp -r assets/ /tmp/fresh_project/assets/
          else
            mkdir -p /tmp/fresh_project/assets/images
            touch /tmp/fresh_project/assets/images/.gitkeep
          fi
          echo "Source copied"

      # Write pubspec.yaml with pinned safe versions
      # These versions are all confirmed compatible with Flutter 3.24 + SDK 34
      - name: Write safe pubspec.yaml
        run: |
          cat > /tmp/fresh_project/pubspec.yaml << 'PUBSPEC'
          name: nav_assist
          description: AI Navigation Assistant
          publish_to: 'none'
          version: 1.0.0+1

          environment:
            sdk: '>=3.0.0 <4.0.0'
            flutter: '>=3.10.0'

          dependencies:
            flutter:
              sdk: flutter

            # USB Serial for Arduino OTG — pinned to last stable version
            usb_serial: 0.4.0

            # HTTP for Gemini API
            http: 1.1.0

            # Camera
            camera: 0.10.5+9

            # Text to speech
            flutter_tts: 3.8.5

            # CSV writing
            csv: 5.0.2

            # File paths
            path_provider: 2.1.1

            # Permissions
            permission_handler: 11.0.1

            # Image utilities
            image: 4.1.3

            # Base64 / encoding
            convert: 3.1.1

            # Settings storage
            shared_preferences: 2.2.2

            # Keep screen on
            wakelock_plus: 1.1.4

            # package_info_plus pinned to 4.x — version 9 breaks SDK 34
            package_info_plus: 4.2.0

          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: 3.0.0

          flutter:
            uses-material-design: true
            assets:
              - assets/images/
          PUBSPEC
          echo "pubspec.yaml written"

      # Write the Android app/build.gradle with explicit SDK versions
      # This replaces the fresh project's build.gradle entirely
      - name: Write Android build.gradle
        run: |
          cat > /tmp/fresh_project/android/app/build.gradle << 'BUILDGRADLE'
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          }

          def localProperties = new Properties()
          def localPropertiesFile = rootProject.file('local.properties')
          if (localPropertiesFile.exists()) {
              localPropertiesFile.withReader('UTF-8') { reader ->
                  localProperties.load(reader)
              }
          }

          def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
          if (flutterVersionCode == null) {
              flutterVersionCode = '1'
          }

          def flutterVersionName = localProperties.getProperty('flutter.versionName')
          if (flutterVersionName == null) {
              flutterVersionName = '1.0'
          }

          android {
              namespace "com.navassist.nav_assist"
              compileSdk 34

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }

              kotlinOptions {
                  jvmTarget = '1.8'
              }

              sourceSets {
                  main.java.srcDirs += 'src/main/kotlin'
              }

              defaultConfig {
                  applicationId "com.navassist.app"
                  minSdk 21
                  targetSdk 34
                  versionCode flutterVersionCode.toInteger()
                  versionName flutterVersionName
              }

              buildTypes {
                  release {
                      signingConfig signingConfigs.debug
                      minifyEnabled false
                      shrinkResources false
                  }
              }
          }

          flutter {
              source '../..'
          }
          BUILDGRADLE
          echo "build.gradle written"

      # Write the root android/build.gradle with explicit versions
      - name: Write root build.gradle
        run: |
          cat > /tmp/fresh_project/android/build.gradle << 'ROOTGRADLE'
          buildscript {
              ext.kotlin_version = '1.9.23'
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.1.0'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
              }
          }

          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }

          rootProject.buildDir = '../build'
          subprojects {
              project.buildDir = "${rootProject.buildDir}/${project.name}"
          }
          subprojects {
              project.evaluationDependsOn(':app')
          }

          tasks.register("clean", Delete) {
              delete rootProject.buildDir
          }
          ROOTGRADLE
          echo "Root build.gradle written"

      # Write gradle wrapper properties with a compatible Gradle version
      - name: Write gradle wrapper properties
        run: |
          mkdir -p /tmp/fresh_project/android/gradle/wrapper
          cat > /tmp/fresh_project/android/gradle/wrapper/gradle-wrapper.properties << 'GRADLEWRAPPER'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.3-all.zip
          GRADLEWRAPPER
          echo "Gradle wrapper written"

      # Write AndroidManifest.xml with all required permissions
      - name: Write AndroidManifest.xml
        run: |
          cat > /tmp/fresh_project/android/app/src/main/AndroidManifest.xml << 'MANIFEST'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <uses-permission android:name="android.permission.CAMERA" />
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"
                  android:maxSdkVersion="28" />
              <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" />

              <uses-feature android:name="android.hardware.usb.host" android:required="false" />
              <uses-feature android:name="android.hardware.camera" android:required="true" />

              <application
                  android:label="NavAssist"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:requestLegacyExternalStorage="true">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">

                      <meta-data
                          android:name="io.flutter.embedding.android.NormalTheme"
                          android:resource="@style/NormalTheme" />

                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>

                      <intent-filter>
                          <action android:name="android.hardware.usb.action.USB_DEVICE_ATTACHED" />
                      </intent-filter>
                      <meta-data
                          android:name="android.hardware.usb.action.USB_DEVICE_ATTACHED"
                          android:resource="@xml/device_filter" />

                  </activity>

                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />

              </application>
          </manifest>
          MANIFEST
          echo "AndroidManifest written"

      # Write USB device filter
      - name: Write USB device filter
        run: |
          mkdir -p /tmp/fresh_project/android/app/src/main/res/xml
          cat > /tmp/fresh_project/android/app/src/main/res/xml/device_filter.xml << 'DEVICEFILTER'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <usb-device vendor-id="9025" />
              <usb-device vendor-id="6790" />
              <usb-device vendor-id="4292" />
          </resources>
          DEVICEFILTER
          echo "Device filter written"

      # Get dependencies
      - name: Get dependencies
        working-directory: /tmp/fresh_project
        run: flutter pub get

      # Build APK
      - name: Build APK
        working-directory: /tmp/fresh_project
        run: flutter build apk --release --no-tree-shake-icons

      # Verify and upload
      - name: Verify APK exists
        run: |
          ls -lh /tmp/fresh_project/build/app/outputs/flutter-apk/
          echo "APK size: $(du -sh /tmp/fresh_project/build/app/outputs/flutter-apk/app-release.apk | cut -f1)"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nav-assist-apk
          path: /tmp/fresh_project/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
          if-no-files-found: error
